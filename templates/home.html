<!DOCTYPE html>
<html>
<head>
    <title>Anomaly Detector</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
        }

        .upload-card {
            border-radius: 12px;
            border: none;
        }

        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 10px;
            padding: 30px;
            transition: 0.3s;
            cursor: pointer;
        }

        .upload-area:hover {
            border-color: #0d6efd;
            background-color: #f8f9fa;
        }

        .btn-primary {
            padding: 10px 25px;
            font-weight: 500;
        }
    </style>
</head>

<body class="bg-light">

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="card upload-card shadow p-4 col-md-5 text-center">

        <!-- Title -->
        <h3 class="mb-2">Smart Anomaly Detection</h3>
        <p class="text-muted mb-4">Upload your dataset to detect anomalies instantly</p>

        <!-- Upload Form -->
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}

            <!-- Upload Box -->
            <label class="upload-area w-100 mb-3">
                <input type="file" name="file" class="form-control d-none" id="fileInput">

                <div id="fileText">
                    <h6 class="mb-1">Click or drag file here</h6>
                    <small class="text-muted">Supports CSV files</small>
                </div>
            </label>

            <!-- File Name -->
            <div id="fileName" class="text-success mb-3" style="display:none;"></div>

            <!-- Button -->
            <button class="btn btn-primary w-100">Upload & Analyze</button>
        </form>

    </div>

</div>

<!-- JS -->
<script>
const fileInput = document.getElementById("fileInput");
const fileName = document.getElementById("fileName");

fileInput.addEventListener("change", function () {
    if (fileInput.files.length > 0) {
        fileName.style.display = "block";
        fileName.innerText = "Selected: " + fileInput.files[0].name;
    }
});
</script>

</body>
</html>

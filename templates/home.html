{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Anomaly Detector</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'css/home.css' %}" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container vh-100 d-flex align-items-center justify-content-center">

    <div class="card upload-card shadow p-4 col-md-5 text-center">

        <!-- Title -->
        <h3 class="mb-2">Smart Anomaly Detection</h3>
        <p class="text-muted mb-4">Upload your dataset to detect anomalies instantly</p>

        <!-- Upload Form -->
        <form method="post" enctype="multipart/form-data" onsubmit="showLoader()">
            {% csrf_token %}

            <!-- Upload Box -->
            <label class="upload-area w-100 mb-3">
                <input type="file" name="file" class="form-control d-none" id="fileInput">

                <div id="fileText">
                    <h6 class="mb-1">Click or drag file here</h6>
                    <small class="text-muted">Supports CSV files</small>
                </div>
            </label>

            <!-- File Name -->
            <div id="fileName" class="text-success mb-3" style="display:none;"></div>

            <!-- Button -->
            <button id="submitBtn" class="btn btn-primary w-100">Upload & Analyze</button>
        </form>
        <div id="loader" class="text-center mt-3" style="display:none;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">Processing file... Please wait</p>
        </div>
    </div>

</div>

<!-- JS -->
<script src="{% static 'js/home.js' %}"></script>
</body>
</html>
